services:

  # MongoDB - Stores test scripts, runs, metrics, logs
  mongodb:
    image: mongo:7.0
    container_name: k6_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongodb123
      MONGO_INITDB_DB: k6_testing
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test -u admin -p mongodb123 --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # InfluxDB - Time-series database for K6 metrics
  influxdb:
    image: influxdb:1.8
    container_name: k6_influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6        # Create the k6 database automatically
    volumes:
      - influxdb_data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Grafana - Visualize K6 metrics from InfluxDB
  grafana:
    image: grafana/grafana:latest
    container_name: k6_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # K6 - Load testing framework
  # Note: This runs K6 in the container, but tests are executed from Python
  # The K6 command in service.py needs to be adjusted based on your setup
  k6:
    image: grafana/k6:latest
    container_name: k6_runner
    working_dir: /scripts
    volumes:
      - .:/scripts
    environment:
      K6_OUT: influxdb=http://influxdb:8086/k6
      K6_VUS: 10
      K6_DURATION: 60s
    depends_on:
      influxdb:
        condition: service_healthy
    restart: "no"  # K6 container itself won't run continuously

  # FastAPI Backend - Python application
  # Uncomment below if running backend in Docker
  # backend:
  #   build: .
  #   container_name: api_testing_backend
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     MONGO_URL: mongodb://admin:mongodb123@mongodb:27017/
  #     MONGO_DB: k6_testing
  #     INFLUXDB_URL: http://influxdb:8086
  #   depends_on:
  #     mongodb:
  #       condition: service_healthy
  #     influxdb:
  #       condition: service_healthy
  #   volumes:
  #     - .:/app
  #   command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongodb_data:
  influxdb_data:
  grafana_data:

networks:
  default:
    name: k6_testing_network