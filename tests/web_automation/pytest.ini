[pytest]
log_cli            = true
log_cli_level      = INFO
log_format         = %(asctime)s [%(levelname)s] %(message)s
log_date_format    = %H:%M:%S

filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

addopts =
    --alluredir=reports/allure-results
    -v
    --tb=short